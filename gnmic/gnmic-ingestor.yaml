# gNMIc ingestor for Cisco IOS-XE (C9k) — aligns with CML BGP-EVPN lab (border/leaf).
# Targets: management IPs and gNMI port (57400). Add more entries as needed.
# Production: use env or file-based secrets for passwords; do not commit real credentials.
---
# Lab credential only; for production use env or secrets (do not commit real passwords).
username: netadmin
password: C1sco12345
log: true

# border-1, border-2, leaf-1, leaf-2 (198.18.170.x from CML). c8k-core01 often has no gNMI.
#  198.18.170.200:  # c8k-core01 — uncomment if your image supports gnmi-yang/gnxi
#    port: "57400"
#    skip-verify: true
#    insecure: true
#    subscriptions: [iosxe-if-state-sample, iosxe-if-stats, iosxe-system]
targets:
  198.18.170.211:
    port: "57400"
    skip-verify: true
    insecure: true
    password: C1sco12345
    subscriptions:
      - iosxe-if-state-sample
      - iosxe-if-stats
      - iosxe-system
  198.18.170.212:
    port: "57400"
    skip-verify: true
    insecure: true
    password: C1sco12345
    subscriptions:
      - iosxe-if-state-sample
      - iosxe-if-stats
      - iosxe-system
  198.18.170.221:
    port: "57400"
    skip-verify: true
    insecure: true
    password: C1sco12345
    subscriptions:
      - iosxe-if-state-sample
      - iosxe-if-stats
      - iosxe-system
  198.18.170.222:
    port: "57400"
    skip-verify: true
    insecure: true
    password: C1sco12345
    subscriptions:
      - iosxe-if-state-sample
      - iosxe-if-stats
      - iosxe-system

subscriptions:
  # Interface state via SAMPLE (IOS-XE rejects ON_CHANGE with filter-type for these paths).
  iosxe-if-state-sample:
    mode: stream
    stream-mode: sample
    sample-interval: 30s
    paths:
      - /interfaces/interface[name=*]/state
    outputs:
      - nats-iosxe-out

  iosxe-if-stats:
    mode: stream
    stream-mode: sample
    sample-interval: 15s
    paths:
      - /interfaces/interface[name=*]/state/counters
    outputs:
      - nats-iosxe-out

  # Optional: system memory (and CPU if path supported by image).
  # Use OpenConfig module prefix; without it gNMIc may not send this subscription (only interface subs appear in logs).
  iosxe-system:
    mode: stream
    stream-mode: sample
    sample-interval: 15s
    paths:
      - /openconfig-system:system/memory/state
      # - /openconfig-system:system/cpus/cpu[index=*]/state  # Uncomment if IOS-XE supports OpenConfig CPU
    outputs:
      - nats-iosxe-out

  # Optional: BGP (uncomment if your IOS-XE image supports this path)
  # iosxe-bgp:
  #   mode: stream
  #   stream-mode: sample
  #   sample-interval: 15s
  #   paths:
  #     - /network-instances/network-instance[name=*]/protocols/protocol[name=*]/bgp/state
  #   outputs:
  #     - nats-iosxe-out

outputs:
  nats-iosxe-out:
    type: jetstream
    name: gnmic-ingress-iosxe
    address: nats:4222
    stream: iosxe
    create-stream:
      description: IOS-XE telemetry for C9k
      subjects: []
      storage: file
      max-msgs: 3000000
    subject-format: subscription.target
    connect-time-wait: 2s
    format: event
    split-events: false
    override-timestamps: false
    num-workers: 1
    write-timeout: 5s
    debug: false
    buffer-size: 0
    enable-metrics: true
    event-processors: []

api-server:
  address: :7890
  timeout: 10s
  enable-metrics: true
  debug: false
  healthz-disable-logging: true
