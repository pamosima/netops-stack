---
# NetBox dynamic inventory. Plugin reads API URL and token from environment:
#   NETBOX_URL or NETBOX_API — e.g. https://netbox.example.com
#   NETBOX_TOKEN — API token
# No api_endpoint/token in YAML so the file parses cleanly; set vars in env or GitLab CI.

plugin: netbox.netbox.nb_inventory
validate_certs: false
config_context: false
flatten_custom_fields: false
site_data: true
virtual_chassis_name: true
group_names_raw: true

# Only sync devices you expect to automate (active). Mark maintenance/spares as Offline in NetBox.
query_filters:
  - status: active

group_by:
  - sites
  - device_roles

# Groups netbox_status_active, netbox_status_offline, … (playbooks use netbox_status_active)
keyed_groups:
  - prefix: netbox_status
    key: status.value

compose:
  primary_ip: primary_ip.address
  # Map NetBox platform slug to Ansible network OS (e.g. ios, cisco-ios -> cisco.ios.ios)
  ansible_network_os: platform.slug
  # NetBox DCIM status slug: active, offline, planned, staged, failed, inventory, decommissioning
  netbox_device_status: status.value
