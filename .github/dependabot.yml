# Dependabot — weekly version updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Labels: omit `labels` so GitHub uses the default `dependencies` label (created if missing).
# To use custom labels (`security`, `docker`, etc.), create them in the repo first, then
# add a `labels:` block per ecosystem.
#
# If `uv` is unsupported (older GHES), replace the netops-mcp-server `uv` block with:
#   package-ecosystem: pip
#   directory: "/netops-mcp-server"
# and add a committed requirements.txt from `uv export --frozen`.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "pip"
    directory: "/gitlab"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/clickhouse"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "uv"
    directory: "/netops-mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    directory: "/gitlab"
    schedule:
      interval: "weekly"
      day: "monday"

  # Stay on Python 3.12 for MCP + exporter; block Dependabot PRs to 3.13/3.14+ until explicitly upgraded.
  - package-ecosystem: "docker"
    directory: "/netops-mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "python"
        versions: ["3.13-slim", "3.14-slim", "3.15-slim", "3.16-slim"]

  - package-ecosystem: "docker"
    directory: "/clickhouse"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "python"
        versions: ["3.13-slim", "3.14-slim", "3.15-slim", "3.16-slim"]
