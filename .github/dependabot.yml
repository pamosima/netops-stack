# Dependabot — weekly updates with security-focused labels
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# If `uv` is unsupported (older GHES), replace the netops-mcp-server `uv` block with:
#   package-ecosystem: pip
#   directory: "/netops-mcp-server"
# and add a committed requirements.txt from `uv export --frozen`.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/gitlab"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "python"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/clickhouse"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "python"

  - package-ecosystem: "uv"
    directory: "/netops-mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "python"
      - "uv"

  - package-ecosystem: "docker"
    directory: "/gitlab"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "docker"

  # Stay on Python 3.12 for MCP + exporter; block Dependabot PRs to 3.13/3.14+ until explicitly upgraded.
  - package-ecosystem: "docker"
    directory: "/netops-mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "docker"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "python"
        versions: ["3.13-slim", "3.14-slim", "3.15-slim", "3.16-slim"]

  - package-ecosystem: "docker"
    directory: "/clickhouse"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
      - "docker"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "python"
        versions: ["3.13-slim", "3.14-slim", "3.15-slim", "3.16-slim"]
