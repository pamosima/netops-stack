# ClickHouse native Prometheus integration (https://clickhouse.com/docs/interfaces/prometheus)
# The ClickStack all-in-one image does not expose the Prometheus endpoint (9363); only HTTP 8123 is available.
# Uncomment below when using a ClickHouse setup that has the Prometheus handler on 9363.
# remote_write:
#   - url: http://netops-stack-clickstack:9363/write
#     queue_config:
#       capacity: 10000
#       max_shards: 50
# remote_read:
#   - url: http://netops-stack-clickstack:9363/read

scrape_configs:
  - job_name: prometheus
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 5s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
        - localhost:9090
  - job_name: gnmic
    static_configs:
      - targets:
        - gnmic-ingestor:7890
        - gnmic-emitter:7890
  - job_name: nats
    static_configs:
      - targets:
        - nats-exporter:7777
  # IPFIX/flow collector (present when using compose-ipfix.yaml); use DNS (service name)
  - job_name: ipfix
    scrape_interval: 15s
    static_configs:
      - targets:
        - netops-stack-ipfix:8081
  # ClickHouse (ClickStack) - 9363 not exposed by all-in-one image; enable when using a CH with Prometheus handler
  # - job_name: clickhouse
  #   scrape_interval: 15s
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #       - netops-stack-clickstack:9363
